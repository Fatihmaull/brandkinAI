name: Deploy BrandKin AI to Alibaba Cloud

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  OSS_REGION: ap-southeast-1

jobs:
  deploy-backend:
    name: Deploy Backend to Function Compute
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (for Serverless Devs)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Configure Alibaba Cloud Credentials
        run: |
          s config add --AccessKeyID ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }} --AccessKeySecret ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }} --AccountID ${{ secrets.ALIBABA_CLOUD_ACCOUNT_ID }} -a default -f

      - name: Deploy to Function Compute
        working-directory: backend
        env:
          MODELSTUDIO_API_KEY: ${{ secrets.MODELSTUDIO_API_KEY }}
          OSS_BUCKET: ${{ secrets.OSS_FRONTEND_BUCKET }}
          OSS_ENDPOINT: oss-${{ env.OSS_REGION }}.aliyuncs.com
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          RDS_HOST: ${{ secrets.RDS_HOST }}
          RDS_PORT: "3106"
          RDS_DATABASE: ${{ secrets.RDS_DATABASE }}
          RDS_USER: ${{ secrets.RDS_USER }}
          RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}
        run: |
          generate_function() {
            local svc_name=$1 fn_name=$2 desc=$3 handler=$4 mem=$5 timeout=$6 triggers=$7
            echo "  ${svc_name}:"
            echo "    component: fc3"
            echo "    props:"
            echo "      region: ap-southeast-1"
            echo "      functionName: ${fn_name}"
            echo "      description: '${desc}'"
            echo "      runtime: python3.10"
            echo "      handler: ${handler}"
            echo "      memorySize: ${mem}"
            echo "      timeout: ${timeout}"
            echo "      code: ./fc-functions"
            echo "      environmentVariables:"
            echo "        PYTHONPATH: /code"
            echo "        MODELSTUDIO_API_KEY: '${MODELSTUDIO_API_KEY}'"
            echo "        OSS_BUCKET: '${OSS_BUCKET}'"
            echo "        OSS_ENDPOINT: '${OSS_ENDPOINT}'"
            echo "        OSS_ACCESS_KEY_ID: '${OSS_ACCESS_KEY_ID}'"
            echo "        OSS_ACCESS_KEY_SECRET: '${OSS_ACCESS_KEY_SECRET}'"
            echo "        RDS_HOST: '${RDS_HOST}'"
            echo "        RDS_PORT: '${RDS_PORT}'"
            echo "        RDS_DATABASE: '${RDS_DATABASE}'"
            echo "        RDS_USER: '${RDS_USER}'"
            echo "        RDS_PASSWORD: '${RDS_PASSWORD}'"
            echo "        CORS_ALLOWED_ORIGINS: '*'"
            if [ -n "$triggers" ]; then
              echo "      triggers:"
              echo "        - triggerName: httpTrigger"
              echo "          triggerType: http"
              echo "          triggerConfig:"
              echo "            authType: anonymous"
              echo "            methods:"
              echo "              - GET"
              echo "              - POST"
              echo "              - PUT"
              echo "              - DELETE"
              echo "              - OPTIONS"
            fi
          }

          {
            echo "edition: 3.0.0"
            echo "name: brandkin-ai"
            echo "access: default"
            echo ""
            echo "resources:"
            generate_function "api-handler" "api-handler" "Main API Handler" "orchestrator.api_handler.handler" 512 60 "yes"
            generate_function "stage1-dna" "stage1-dna-handler" "Stage 1 - Brand DNA" "stage_handlers.stage1_dna.handler" 512 120 ""
            generate_function "stage2-visual" "stage2-visual-handler" "Stage 2 - Visual Gen" "stage_handlers.stage2_visual.handler" 1024 300 ""
            generate_function "stage4-poses" "stage4-poses-handler" "Stage 4 - Pose Pack" "stage_handlers.stage4_poses.handler" 1024 600 ""
            generate_function "stage5-code" "stage5-code-handler" "Stage 5 - Code Export" "stage_handlers.stage5_code.handler" 512 120 ""
            generate_function "stage7-assembly" "stage7-assembly-handler" "Stage 7 - Assembly" "stage_handlers.stage7_assembly.handler" 1024 300 ""
          } > s.yaml

          echo "=== Generated s.yaml ==="
          cat s.yaml
          echo "========================"
          s deploy -y

  deploy-frontend:
    name: Deploy Frontend to OSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/nextjs-app/package-lock.json'

      - name: Install Dependencies
        run: |
          cd frontend/nextjs-app
          npm ci

      - name: Build Next.js App
        run: |
          cd frontend/nextjs-app
          npm run build

      - name: Setup Alibaba Cloud OSSUTIL
        uses: manyuanrong/setup-ossutil@v3.0
        with:
          endpoint: "oss-${{ env.OSS_REGION }}.aliyuncs.com"
          access-key-id: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}

      - name: Sync Static Export to OSS Bucket
        env:
          OSS_BUCKET: ${{ secrets.OSS_FRONTEND_BUCKET }}
        run: |
          cd frontend/nextjs-app
          BUILD_DIR="out"
          if [ ! -d "$BUILD_DIR" ]; then BUILD_DIR="dist"; fi
          echo "Deploying $BUILD_DIR to oss://$OSS_BUCKET/"
          ossutil cp -r -f "$BUILD_DIR/" "oss://$OSS_BUCKET/"

      - name: Configure OSS Cache Headers
        env:
          OSS_BUCKET: ${{ secrets.OSS_FRONTEND_BUCKET }}
        run: |
          ossutil set-meta "oss://$OSS_BUCKET/_next/static/" "Cache-Control:public,max-age=31536000,immutable" --update -r || true
          ossutil set-meta "oss://$OSS_BUCKET/" "Content-Type:text/html" --include "*.html" --update -r || true
