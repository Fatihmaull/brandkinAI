name: Deploy BrandKin AI to Alibaba Cloud

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  OSS_REGION: ap-southeast-1

jobs:
  deploy-backend:
    name: Deploy Backend to Function Compute
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (for Serverless Devs)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Configure Alibaba Cloud Credentials
        run: |
          s config add --AccessKeyID ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }} --AccessKeySecret ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }} --AccountID ${{ secrets.ALIBABA_CLOUD_ACCOUNT_ID }} -a default -f

      - name: Deploy to Function Compute
        working-directory: backend
        run: |
          # Generate s.yaml with actual values (bypass broken ${env.VAR})
          cat > s.yaml << 'YAMLEOF'
          edition: 3.0.0
          name: brandkin-ai
          access: default

          services:
            api-handler:
              component: fc3
              props:
                region: ap-southeast-1
                functionName: api-handler
                description: Main API Handler for BrandKin AI
                runtime: python3.10
                handler: orchestrator.api_handler.handler
                memorySize: 512
                timeout: 60
                code: ./fc-functions
                environmentVariables:
                  PYTHONPATH: /code
          YAMLEOF

          # Now use sed to inject secret values into environmentVariables
          # Write a simpler s.yaml using Python for proper YAML formatting
          python3 -c "
          import yaml, os

          config = {
            'edition': '3.0.0',
            'name': 'brandkin-ai',
            'access': 'default',
            'services': {}
          }

          env_vars = {
            'PYTHONPATH': '/code',
            'MODELSTUDIO_API_KEY': os.environ.get('MODELSTUDIO_API_KEY', ''),
            'OSS_BUCKET': os.environ.get('OSS_BUCKET', ''),
            'OSS_ENDPOINT': os.environ.get('OSS_ENDPOINT', ''),
            'OSS_ACCESS_KEY_ID': os.environ.get('OSS_ACCESS_KEY_ID', ''),
            'OSS_ACCESS_KEY_SECRET': os.environ.get('OSS_ACCESS_KEY_SECRET', ''),
            'RDS_HOST': os.environ.get('RDS_HOST', ''),
            'RDS_PORT': os.environ.get('RDS_PORT', '3106'),
            'RDS_DATABASE': os.environ.get('RDS_DATABASE', ''),
            'RDS_USER': os.environ.get('RDS_USER', ''),
            'RDS_PASSWORD': os.environ.get('RDS_PASSWORD', ''),
            'CORS_ALLOWED_ORIGINS': '*'
          }

          functions = [
            ('api-handler', 'api-handler', 'Main API Handler', 'orchestrator.api_handler.handler', 512, 60),
            ('stage1-dna', 'stage1-dna-handler', 'Stage 1 - Brand DNA', 'stage_handlers.stage1_dna.handler', 512, 120),
            ('stage2-visual', 'stage2-visual-handler', 'Stage 2 - Visual Gen', 'stage_handlers.stage2_visual.handler', 1024, 300),
            ('stage4-poses', 'stage4-poses-handler', 'Stage 4 - Pose Pack', 'stage_handlers.stage4_poses.handler', 1024, 600),
            ('stage5-code', 'stage5-code-handler', 'Stage 5 - Code Export', 'stage_handlers.stage5_code.handler', 512, 120),
            ('stage7-assembly', 'stage7-assembly-handler', 'Stage 7 - Assembly', 'stage_handlers.stage7_assembly.handler', 1024, 300),
          ]

          for svc_name, fn_name, desc, handler, mem, timeout in functions:
            trigger_config = None
            if svc_name == 'api-handler':
              trigger_config = [{
                'triggerName': 'httpTrigger',
                'triggerType': 'http',
                'triggerConfig': {
                  'authType': 'anonymous',
                  'methods': ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS']
                }
              }]

            props = {
              'region': 'ap-southeast-1',
              'functionName': fn_name,
              'description': desc,
              'runtime': 'python3.10',
              'handler': handler,
              'memorySize': mem,
              'timeout': timeout,
              'code': './fc-functions',
              'environmentVariables': env_vars,
            }
            if trigger_config:
              props['triggers'] = trigger_config

            config['services'][svc_name] = {
              'component': 'fc3',
              'props': props
            }

          with open('s.yaml', 'w') as f:
            yaml.dump(config, f, default_flow_style=False, sort_keys=False)
          print('Generated s.yaml successfully')
          "

          cat s.yaml
          s deploy -y
        env:
          MODELSTUDIO_API_KEY: ${{ secrets.MODELSTUDIO_API_KEY }}
          OSS_BUCKET: ${{ secrets.OSS_FRONTEND_BUCKET }}
          OSS_ENDPOINT: oss-${{ env.OSS_REGION }}.aliyuncs.com
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          RDS_HOST: ${{ secrets.RDS_HOST }}
          RDS_PORT: "3106"
          RDS_DATABASE: ${{ secrets.RDS_DATABASE }}
          RDS_USER: ${{ secrets.RDS_USER }}
          RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}

  deploy-frontend:
    name: Deploy Frontend to OSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/nextjs-app/package-lock.json'

      - name: Install Dependencies
        run: |
          cd frontend/nextjs-app
          npm ci

      - name: Build Next.js App
        run: |
          cd frontend/nextjs-app
          npm run build

      - name: Setup Alibaba Cloud OSSUTIL
        uses: manyuanrong/setup-ossutil@v3.0
        with:
          endpoint: "oss-${{ env.OSS_REGION }}.aliyuncs.com"
          access-key-id: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}

      - name: Sync Static Export to OSS Bucket
        env:
          OSS_BUCKET: ${{ secrets.OSS_FRONTEND_BUCKET }}
        run: |
          cd frontend/nextjs-app
          BUILD_DIR="out"
          if [ ! -d "$BUILD_DIR" ]; then BUILD_DIR="dist"; fi
          echo "Deploying $BUILD_DIR to oss://$OSS_BUCKET/"
          ossutil cp -r -f "$BUILD_DIR/" "oss://$OSS_BUCKET/"

      - name: Configure OSS Cache Headers
        env:
          OSS_BUCKET: ${{ secrets.OSS_FRONTEND_BUCKET }}
        run: |
          ossutil set-meta "oss://$OSS_BUCKET/_next/static/" "Cache-Control:public,max-age=31536000,immutable" --update -r || true
          ossutil set-meta "oss://$OSS_BUCKET/" "Content-Type:text/html" --include "*.html" --update -r || true
