name: Deploy BrandKin AI to Alibaba Cloud

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy-backend:
    name: Deploy Backend to Function Compute
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (for Serverless Devs)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Configure Alibaba Cloud Credentials
        run: |
          s config add --AccessKeyID ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }} --AccessKeySecret ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }} --AccountID ${{ secrets.ALIBABA_CLOUD_ACCOUNT_ID }} -a default -f
        
      - name: Deploy to Function Compute
        run: |
          cd backend
          s deploy -y --use-local

  deploy-frontend:
    name: Deploy Frontend to OSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/nextjs-app/package-lock.json'

      - name: Install Dependencies
        run: |
          cd frontend/nextjs-app
          npm ci

      - name: Build Next.js App
        run: |
          cd frontend/nextjs-app
          npm run build

      - name: Setup Alibaba Cloud OSSUTIL
        uses: manyuanrong/setup-ossutil@v2.0
        with:
          endpoint: "oss-cn-hangzhou.aliyuncs.com"
          access-key-id: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}

      - name: Sync Static Export to OSS Bucket
        env:
          OSS_BUCKET: ${{ secrets.OSS_FRONTEND_BUCKET || 'brandkin-ai-frontend' }}
        run: |
          cd frontend/nextjs-app
          # Default Next.js static export directory is 'out' instead of 'dist' in modern Next.js
          # Will sync 'out' folder or 'dist' based on what exists
          BUILD_DIR="out"
          if [ ! -d "$BUILD_DIR" ]; then BUILD_DIR="dist"; fi
          
          echo "Deploying $BUILD_DIR to oss://$OSS_BUCKET/"
          ossutil cp -r -f "$BUILD_DIR/" "oss://$OSS_BUCKET/"
          
      - name: Configure OSS Headers
        env:
          OSS_BUCKET: ${{ secrets.OSS_FRONTEND_BUCKET || 'brandkin-ai-frontend' }}
        run: |
          ossutil set-meta "oss://$OSS_BUCKET/_next/static/" "Cache-Control:public,max-age=31536000,immutable" --update -r
          ossutil set-meta "oss://$OSS_BUCKET/" "Content-Type:text/html" --include "*.html" --update -r
